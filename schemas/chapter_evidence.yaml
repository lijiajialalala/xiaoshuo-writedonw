    information_reveal: ""
    payoff: ""
    state_change: ""
    ending_hook: ""
    next_chapter_pressure: ""
    platform_signal: "" # 读完率 / 追读 / 付费预期 / 改编画面 / 编辑审稿点
    editor_review_signal: "" # 编辑会不会继续看：卖点 / 冲突 / 逻辑 / 行文 / 主线 / 人设
    outline_signal: "" # 是否透露长期主线、第一卷方向、资源循环、未解问题
    ai_quality_signal: "" # 是否像AI水文：空泛、重复、突兀、逻辑断裂、人物工具化
    evidence_quote_or_summary: ""
    transfer_boundary: "" # transferable_mechanism / observe_only / forbidden_shape
