  editor_gate_note: "" # 编辑视角：题材/书名/简介/卖点/开篇是否有签约或直发验证潜力
  outline_learning_note: "" # 从前10章反推：这本书是否有第一卷/长线大纲能力
  ai_low_quality_risk: "" # 是否有AI味、低质水文、逻辑拼凑、人物不一致、批量生产感

chapter_records:
