book_level_observation:
  intro_promise: "749、怪物收容、无女主、杀伐果断；主角加入异常收容体系，通过收容怪物获得成长和事件推进。"
  suspected_route_candidate: "官方异常组织接入 + 怪物收容成长循环路线"
  primary_reader_promise: "主角等了多年才等到怪物和金手指可用，一旦遇到异常就主动杀穿；749 提供组织、任务、资源、评级、合法身份和源源不断的怪物，把个人猎怪欲望接成长篇任务循环。"
  secondary_promises:
    - "民俗怪物目录：每个怪物有传说来源、形态、弱点和收容奖励。"
    - "官方组织爽点：工资、福利、权限、装备、功法、贡献点和任务 APP。"
    - "考核/评级爽点：主角用硬实力碾压同届新人，快速获得资源和组织关注。"
    - "杀伐果断人设：主角面对怪物不恐惧，优先考虑弄死、收容和变强。"
    - "案件调查路线：正式任务不是单纯打怪，还需要辅调、嫌疑人分析和线索判断。"
  platform_fit_note: "用户标记为 749/收容方向开山样本；番茄男频阅读榜·都市高武第 5，榜单显示在读 106.3 万；番茄页面显示作者我爱罗的沙、连载中、318.0 万字、最近更新到第 1440 章，适合校准异常收容路线的源头机制。"
  initial_similarity_risk: "高。源头样本只允许提取抽象机制，禁止迁移 749 组织形状、收容桥段顺序、怪物设计、能力来源和标志性开局。"
  editor_gate_note: "标题卖点极直接，首章把大学实习、风水、怪物、金手指、工地异常连在一起；第2-3章快速给双怪物收容和战力证明；第4-5章接入 749 福利体系；第9-10章启动第一个正式任务。直发验证强，但前10章组织设定较多，必须靠主角行动爽感抵消说明压力。"
  outline_learning_note: "前10章建立了长篇循环：遇怪/任务 -> 收容或击杀 -> 获得能力/资源/贡献 -> 组织评级和权限提升 -> 接更高任务。第一卷可以围绕实习期十次任务、转正、首个案件链和组织内部认可展开。"
  continuity_memory_note: "必须外部记录收容怪物名册、每只怪物来源和奖励、陆鼎能力列表、境界、功法、贡献点、749 规则、任务权限、同届新人关系、邓部长照拂、燕非凡辅调能力和第一个案件嫌疑人链。"
  ai_low_quality_risk: "主要风险是把 749 写成福利说明书或把主角写成无脑秒杀机器。真正可学的是：组织制度必须持续把个人欲望转成任务、资源、评级和案件压力；怪物信息必须服务战斗/调查，不是堆民俗百科。"

