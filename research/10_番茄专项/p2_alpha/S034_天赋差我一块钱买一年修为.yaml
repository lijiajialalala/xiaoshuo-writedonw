chapter_motion_summary:
  first_3_chapters:
    promise_setup: "前3章完成“成绩被买断 + 天赋极差 + 系统到账 + 高考合法化目标”的承诺搭建。主角不是直接开打，而是先确认上升路径和暴露风险。"
    immediate_payoff: "前三章还没有正式充值兑现，但完成了拒绝交易、赵泽派杀手、京都武大目标和林晓晓关系线。即时兑现被延后到第5章，但第1章系统比例足够强。"
    protagonist_engine: "主角发动机是被阶层压迫后的自证需求、对系统秘密的风险意识、对顶级武大资源的判断，以及钱可转化为战力的计算。"
    failure_or_gap: "前三章充值兑现稍晚，若读者只追系统爽点可能会觉得等得久；但它补足了合法化暴涨和资金价值的底层逻辑。"
  first_10_chapters:
    mini_loop: "第1-4章建立压迫、系统、目标和拒绝捷径；第5-6章用借贷完成气血和武技暴涨；第7-9章反杀赵泽派来的杀手，把敌人资金转成资源并处理债务/痕迹；第10章转入隐藏实力和高级武学需求。"
    obstacle_escalation: "成绩交易 -> 赵泽威胁 -> 顶级武大目标 -> 特招诱惑 -> 资金不足 -> 黑贷风险 -> 杀手入室 -> 善后风险 -> 高级武学价格 -> 敛息功法反噬。"
    reveal_or_flip: "一百万从诱惑变成百万年修为燃料；拒绝特招不是死要面子而是有系统底气；杀手不是威胁而是送钱；继续升气血不一定最优，隐藏实力才是关键拼图。"
    strongest_next_read_hook: "第10章末敛息诀试学被掐断，主角准备用系统氪金补全，直接关系到高考暴露风险。"
    weakest_link: "战力膨胀极快，前10章主角已经达到小城顶级水平；后续必须通过全国天才、权限资源、官方监测、赵家升级和系统成本控制来维持张力。"
  outline_readiness:
    first_volume_hint: "第一卷可围绕高考前三天、赵泽反派线、敛息隐藏、实战考核、京都武大录取和系统暴露边界展开。"
    long_term_pressure: "资金来源、系统秘密、官方检测、武大资源、世家势力、赵家报复、黑贷/地下势力后续追查。"
    resource_or_relationship_cycle: "钱充值为修为/武技；敌人送钱；资源价格反咬；高考/武大给合法身份和更高资源；林晓晓/赵泽分别代表资源帮助和阶层压迫。"
