route_candidate_decision:
  route_candidate_name: "资源燃料型系统升级路线"
  evidence_for:
    - "第1章把交易金额和系统燃料绑定，系统卖点极清楚。"
    - "第2-4章先建立合法化展示和拒绝捷径，避免升级后直接暴露失控。"
    - "第5-6章用借贷完成第一次大额兑现，同时暴露武技和隐藏短板。"
    - "第7-9章让敌人根据旧状态反咬，并把敌人资金转成升级资源。"
    - "第10章及时从堆数值转到隐藏实力，给长期秘密和高考检测留空间。"
  evidence_against:
    - "系统兑换比例过强，前10章战力膨胀非常快，持续张力压力大。"
    - "主角杀人善后处理较硬，存在平台尺度和读者观感风险。"
    - "如果后续资源获取继续太顺，容易变成低质量数值碾压。"
  counterexample_needed: "需要与 S031 的组织任务循环、S033 的公开压力局对照；另需找一本系统不靠钱、或升级更慢但追读强的样本，判断“资源燃料”是否只是本书高概念，而不是通用系统路线。"
  decision: "enter_L2"
  decision_reason: "S034 前10章形成完整小闭环：压迫交易、系统激活、拒绝捷径、首次充值、资金反咬、敌人送钱、隐藏实力需求。可进入 L2，但 L2 必须重点检查战力膨胀如何长期控住。"
