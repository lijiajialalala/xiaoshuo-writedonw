book_level_observation:
  intro_promise: "时间静止、末世灾变、异能、嚣张爽感；主角在高压环境中用可累积的时停能力建立压制性优势。"
  suspected_route_candidate: "有限超规格能力 + 公开压力局 + 错位误判刷资源路线"
  primary_reader_promise: "主角拥有强但受限的时停能力，在奴隶、派系、禁忌物、异化兽等高压规则中，用表演型嚣张和真实计算把必死局翻成身份、资源和战力增长。"
  secondary_promises:
    - "废土生存压力：食物、子弹、城镇安全和异化兽围城持续逼迫行动。"
    - "禁忌物/能力体系：能力不是免费外挂，必须被限制、代价和资源回流机制约束。"
    - "派系政治：东西区统领互相利用，主角的地位提升会制造新的背叛和权力焦虑。"
    - "喜剧错位：外人以为主角疯、莽、玩命，读者知道他在利用规则刷收益。"
    - "配角变量：失败对手李右没有被一次性丢弃，而是留下求生、创伤和后续可用性。"
  platform_fit_note: "番茄男频阅读榜·都市高武第 2；榜单显示在读 245.7 万。番茄书页显示作者六个葫芦、连载中、183.9 万字，适合作为当前官方榜单高热样本。"
  initial_similarity_risk: "高。只允许提取高概念能力如何制造承诺、压迫、兑现和章末钩子的抽象机制；禁止迁移时停能力设定、末世具体桥段、主角口吻、邪神/敌人形状和名场面路径。"
  editor_gate_note: "书名和简介卖点极强，前1章直接给出能力限制、死亡赌局、禁忌物和奴隶处境；第4章完成一次公平兑现，第5-10章把兑现转成身份、资源和新战斗，具备直发强验证潜力。"
  outline_learning_note: "前10章已经出现第一卷苗头：获得禁忌物、改变灰土镇权力结构、解决异化兽围城、处理谭杰/王蛇/李右变量。它不是单章爽点堆叠，而是把能力规则、资源循环和派系压力连在一起。"
  continuity_memory_note: "必须外部记录时停剩余储备、每日累积规则、禁忌物收容状态、气血消耗/回流机制、谭杰和王蛇的误判、李右右手被废但存活、鬣狗群和鬣狗王压力、灰土镇居民对主角的认知变化。"
  ai_low_quality_risk: "主要风险不在空泛，而在容易被AI学成只会嚣张口嗨或无限开挂。真正可学点是限制、误判、代价、资源回流和公共场域反馈；不能只复制疯癫台词和强行反转。"

