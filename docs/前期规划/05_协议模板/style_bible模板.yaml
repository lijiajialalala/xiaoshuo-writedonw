version: 1
project_id: ""
style_name: ""

overall_tone: "冷静、克制、有压迫感，不油腻。"
narration_distance: "贴近主角视角，但避免大量内心独白。"
sentence_rhythm: "短句为主，关键处允许长短变化。"
description_density: "环境描写只服务冲突和人物状态。"
dialogue_style: "短、硬、有潜台词，避免解释设定。"
emotion_method: "少直接说情绪，多用动作、停顿、反应和选择体现。"

forbidden_ai_phrases:
  - "他心中涌起一股复杂的情绪"
  - "眼神中闪过一抹坚定"
  - "空气仿佛凝固了"
  - "命运的齿轮开始转动"
  - "没有人知道，这一刻意味着什么"
  - "下一秒"
  - "就在这时"

forbidden_tone:
  - "油腻霸总腔"
  - "过度鸡汤"
  - "作者直接讲道理"
  - "角色替作者解释设定"

preferred_moves:
  - "用动作代替心理总结。"
  - "用沉默制造压迫。"
  - "用旁人反应放大主角价值。"
  - "用具体物件承载情绪。"
  - "用误判制造读者优越感。"
  - "用未解决危机制造追读。"

dialogue_rules:
  do:
    - "每句对话都带有目的、遮掩、试探、压迫或退让。"
    - "角色说话要符合身份、关系和当前利益。"
  avoid:
    - "长段解释背景。"
    - "所有角色都用同一种语气说话。"
    - "用对话重复读者已经知道的信息。"

description_rules:
  do:
    - "描写只写会影响冲突的信息。"
    - "用一两个具体细节代替泛泛氛围。"
  avoid:
    - "无效环境铺陈。"
    - "抽象形容词堆叠。"

revision_checks:
  - "能不能删掉情绪词而不影响读者理解。"
  - "有没有连续重复冷笑、咬牙、攥拳、挑眉。"
  - "有没有角色替作者说明设定。"
  - "有没有整段总结而不是事件推进。"
  - "本章语言是否与前文一致。"

preferred_examples: []
rejected_examples: []

